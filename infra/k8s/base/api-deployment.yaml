apiVersion: apps/v1
kind: Deployment
metadata:
  name: ugclive-api
  namespace: ugclive-bid
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ugclive-api
  template:
    metadata:
      labels:
        app: ugclive-api
    spec:
      containers:
        - name: api
          image: registry.example.com/ugclive-bid/api:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: ugclive-config
            - secretRef:
                name: ugclive-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
