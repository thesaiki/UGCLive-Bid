apiVersion: v1
kind: Service
metadata:
  name: ugclive-web
  namespace: ugclive-bid
spec:
  selector:
    app: ugclive-web
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: ugclive-api
  namespace: ugclive-bid
spec:
  selector:
    app: ugclive-api
  ports:
    - name: http
      port: 80
      targetPort: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: ugclive-media-origin
  namespace: ugclive-bid
spec:
  type: LoadBalancer
  selector:
    app: ugclive-media-origin
  ports:
    - name: rtmp
      port: 1935
      targetPort: 1935
    - name: webrtc-signaling
      port: 3333
      targetPort: 3333
    - name: webrtc-tls
      port: 3334
      targetPort: 3334
    - name: http
      port: 8081
      targetPort: 8081

