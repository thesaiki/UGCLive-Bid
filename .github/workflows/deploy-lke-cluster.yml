name: Deploy LKE Cluster - UGCLive-Bid

on:
  workflow_dispatch:
    inputs:
      cluster_label:
        description: "Cluster name"
        required: true
        default: "ugclive-bid-prod"
      region:
        description: "Linode region ID"
        required: true
        default: "us-east"
      k8s_version:
        description: "Kubernetes version (blank = latest stable)"
        required: false
        default: ""
      node_type:
        description: "Node pool plan"
        required: true
        default: "g6-standard-4"
      node_count:
        description: "Number of worker nodes"
        required: true
        default: "3"
      ha_control_plane:
        description: "Enable HA control plane"
        required: true
        default: "true"
        type: choice
        options:
          - "false"
          - "true"

env:
  LINODE_CLI_TOKEN: ${{ secrets.LINODE_TOKEN }}

jobs:
  preflight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    outputs:
      k8s_version: ${{ steps.resolve-version.outputs.k8s_version }}
    steps:
      - name: Install tools
        run: |
          pip install linode-cli --quiet
          sudo apt-get update
          sudo apt-get install -y jq
          linode-cli --version

      - name: Verify authentication
        run: |
          linode-cli whoami --json | jq -r '"Authenticated as: " + .[0].username'

      - name: Validate region
        run: |
          VALID=$(linode-cli regions list --json | jq -r '.[].id' | grep -w '${{ inputs.region }}' || true)
          if [ -z "$VALID" ]; then
            echo "ERROR: Region not found. Available regions:"
            linode-cli regions list --json | jq -r '.[].id' | sort
            exit 1
          fi
          echo "Region is valid."

      - name: Validate node plan
        run: |
          VALID=$(linode-cli linodes types --json | jq -r '.[].id' | grep -w '${{ inputs.node_type }}' || true)
          if [ -z "$VALID" ]; then
            echo "ERROR: Node plan not found. Available g6 plans:"
            linode-cli linodes types --json | jq -r '.[].id' | grep -E '^g6-' | sort
            exit 1
          fi
          echo "Node plan is valid."

      - name: Resolve Kubernetes version
        id: resolve-version
        run: |
          if [ -n '${{ inputs.k8s_version }}' ]; then
            K8S_VERSION='${{ inputs.k8s_version }}'
          else
            K8S_VERSION=$(linode-cli lke versions-list --json | jq -r '[.[].id] | sort | last')
          fi
          echo "Resolved version: $K8S_VERSION"
          echo "k8s_version=$K8S_VERSION" >> "$GITHUB_OUTPUT"

  create-cluster:
    name: Create LKE Cluster
    runs-on: ubuntu-latest
    needs: preflight
    outputs:
      cluster_id: ${{ steps.create.outputs.cluster_id }}
    steps:
      - name: Install tools
        run: |
          pip install linode-cli --quiet
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Create LKE cluster
        id: create
        run: |
          HA_FLAG=""
          if [ '${{ inputs.ha_control_plane }}' = 'true' ]; then
            HA_FLAG="--control_plane.high_availability true"
          fi

          CLUSTER_JSON=$(linode-cli lke cluster-create \
            --label '${{ inputs.cluster_label }}' \
            --region '${{ inputs.region }}' \
            --k8s_version '${{ needs.preflight.outputs.k8s_version }}' \
            --node_pools.type '${{ inputs.node_type }}' \
            --node_pools.count '${{ inputs.node_count }}' \
            $HA_FLAG \
            --json)

          CLUSTER_ID=$(echo "$CLUSTER_JSON" | jq -r '.[0].id')

          if [ -z "$CLUSTER_ID" ] || [ "$CLUSTER_ID" = "null" ]; then
            echo "ERROR: Cluster creation failed."
            exit 1
          fi

          echo "cluster_id=$CLUSTER_ID" >> "$GITHUB_OUTPUT"
          echo "Cluster created. ID: $CLUSTER_ID"

      - name: Wait for cluster ready
        run: |
          CLUSTER_ID='${{ steps.create.outputs.cluster_id }}'
          MAX_WAIT=1200
          INTERVAL=20
          ELAPSED=0

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(linode-cli lke clusters-list --json | jq -r --arg id "$CLUSTER_ID" '.[] | select(.id == ($id | tonumber)) | .status // "provisioning"')
            echo "[$ELAPSED s] Status: $STATUS"
            if [ "$STATUS" = "ready" ]; then
              echo "Cluster is ready."
              break
            fi
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "ERROR: Timed out waiting for cluster readiness."
            exit 1
          fi

  verify-cluster:
    name: Retrieve Kubeconfig and Verify
    runs-on: ubuntu-latest
    needs:
      - preflight
      - create-cluster
    steps:
      - name: Install tools
        run: |
          pip install linode-cli --quiet
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          kubectl version --client

      - name: Retrieve kubeconfig
        run: |
          mkdir -p ~/.kube
          linode-cli lke kubeconfig-view '${{ needs.create-cluster.outputs.cluster_id }}' \
            --no-truncation \
            --json \
            | jq -r '.[0].kubeconfig' \
            | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify connectivity
        run: |
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Upload kubeconfig artifact
        uses: actions/upload-artifact@v4
        with:
          name: lke-kubeconfig-${{ needs.create-cluster.outputs.cluster_id }}
          path: ~/.kube/config
          retention-days: 1

      - name: Write summary
        run: |
          echo "### LKE Cluster Deployment Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Label | ${{ inputs.cluster_label }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster ID | ${{ needs.create-cluster.outputs.cluster_id }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Region | ${{ inputs.region }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| K8s version | ${{ needs.preflight.outputs.k8s_version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Node plan | ${{ inputs.node_type }} x ${{ inputs.node_count }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| HA control plane | ${{ inputs.ha_control_plane }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the kubeconfig artifact from this run and store it as the repository secret KUBE_CONFIG for application deployments." >> "$GITHUB_STEP_SUMMARY"

